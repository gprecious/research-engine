<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vectra — AI 이미지를 인쇄 가능한 벡터로</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body, #root { margin: 0; padding: 0; min-height: 100%; background: #ffffff; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      color: #0b0d12;
      font-size: 16px;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    button { font-family: inherit; cursor: pointer; }
    a { color: inherit; }
    ::selection { background: #3b82f6; color: #fff; }

    /* Subtle, original page texture — vertical hairline grid on the hero */
    .hero-grid {
      background-image:
        linear-gradient(to right, rgba(11,13,18,0.04) 1px, transparent 1px);
      background-size: 88px 100%;
    }

    /* Animations */
    @keyframes vectra-shimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }
    @keyframes vectra-fadeup {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes vectra-tracePath {
      to { stroke-dashoffset: 0; }
    }
    @keyframes vectra-dot {
      0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
      40% { transform: scale(1); opacity: 1; }
    }
    .v-fadeup { animation: vectra-fadeup 0.5s ease both; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="landing.jsx"></script>
  <script type="text/babel" src="upload.jsx"></script>
  <script type="text/babel" src="health.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
